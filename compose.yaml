services:
  sut:
    image: ${SUT_IMAGE:?Set SUT_IMAGE in .env or .env.example}
    ports:
      - "${SUT_PORT:-8080}:8080"

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - sut
    environment:
      API_BASE_URL: ${API_BASE_URL:?Set API_BASE_URL}
      API_SPEC_URL: ${API_SPEC_URL:?Set API_SPEC_URL}
      API_TIMEOUT_SECONDS: ${API_TIMEOUT_SECONDS:-10}
      API_READINESS_TIMEOUT_SECONDS: ${API_READINESS_TIMEOUT_SECONDS:-60}
      TEST_USER_1_USERNAME: ${TEST_USER_1_USERNAME:?Set TEST_USER_1_USERNAME}
      TEST_USER_1_PASSWORD: ${TEST_USER_1_PASSWORD:?Set TEST_USER_1_PASSWORD}
      TEST_USER_2_USERNAME: ${TEST_USER_2_USERNAME:?Set TEST_USER_2_USERNAME}
      TEST_USER_2_PASSWORD: ${TEST_USER_2_PASSWORD:?Set TEST_USER_2_PASSWORD}
      LOAD_USERS: ${LOAD_USERS:-25}
      LOAD_SPAWN_RATE: ${LOAD_SPAWN_RATE:-25}
      LOAD_WARMUP_SECONDS: ${LOAD_WARMUP_SECONDS:-5}
      LOAD_DURATION_SECONDS: ${LOAD_DURATION_SECONDS:-60}
      LOAD_MIN_SUCCESSFUL_REQUESTS: ${LOAD_MIN_SUCCESSFUL_REQUESTS:-1000}
      LOAD_TARGET_RPS: ${LOAD_TARGET_RPS:-20}
    volumes:
      - ./reports:/workspace/reports
